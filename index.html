<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --night: #0a0e1a;
    --deep: #111827;
    --dawn: #1e2d4a;
    --gold: #f5a623;
    --silver: #c8d6e8;
    --soft: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--night);
    color: #e8edf5;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--silver);
  }

  #shared-info {
    font-size: 0.68rem;
    color: rgba(200,214,232,0.5);
    letter-spacing: 0.05em;
    text-align: right;
  }

  #shared-info span { color: var(--gold); }

  /* City panels */
  #cities {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .city-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: background 1.2s ease;
  }

  .city-panel:first-child { border-bottom: 1px solid var(--border); }

  .city-panel.is-day { background: linear-gradient(135deg, #1a3a6b 0%, #0e2547 100%); }
  .city-panel.is-night { background: linear-gradient(135deg, #06090f 0%, #0d1526 100%); }
  .city-panel.is-golden { background: linear-gradient(135deg, #2d1e08 0%, #1a1208 100%); }

  /* Arc canvas */
  .arc-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* City controls */
  /* ── Custom city dropdown ── */
  .city-top {
    position: relative;
    z-index: 100;
    padding: 10px 20px 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .city-select-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .city-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    line-height: 1;
    transition: opacity 0.15s;
  }

  .city-chevron {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    margin-left: 6px;
    margin-top: 5px;
    transition: color 0.2s, transform 0.25s;
    line-height: 1;
  }

  .city-select-wrap:hover .city-chevron { color: rgba(255,255,255,0.7); }
  .city-select-wrap:hover .city-label { opacity: 0.85; }
  .city-select-wrap.open .city-chevron {
    transform: rotate(180deg);
    color: var(--gold);
  }

  /* The custom dropdown panel */
  .city-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    width: 260px;
    max-height: 260px;
    overflow-y: auto;
    background: rgba(12, 18, 32, 0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    z-index: 999;
    padding: 6px 0;
    animation: dropIn 0.18s ease;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .city-dropdown.open { display: block; }

  /* Scrollbar */
  .city-dropdown::-webkit-scrollbar { width: 4px; }
  .city-dropdown::-webkit-scrollbar-track { background: transparent; }
  .city-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Search box inside dropdown */
  .dropdown-search-wrap {
    padding: 8px 10px 6px;
    position: sticky;
    top: 0;
    background: rgba(12, 18, 32, 0.98);
    z-index: 2;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .dropdown-search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #e8edf5;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 10px;
    outline: none;
    letter-spacing: 0.03em;
  }

  .dropdown-search::placeholder { color: rgba(200,214,232,0.3); }
  .dropdown-search:focus { border-color: rgba(245,166,35,0.4); }

  .dropdown-option {
    padding: 7px 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    cursor: pointer;
    transition: background 0.1s;
    gap: 8px;
  }

  .dropdown-option:hover { background: rgba(255,255,255,0.06); }
  .dropdown-option.selected { background: rgba(245,166,35,0.1); }
  .dropdown-option.selected .opt-name { color: var(--gold); }

  .opt-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: #e8edf5;
    white-space: nowrap;
  }

  .opt-tz {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: rgba(200,214,232,0.35);
    white-space: nowrap;
  }


  /* Stats row */
  .city-stats {
    position: relative;
    z-index: 2;
    padding: 0 20px 8px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-label {
    font-size: 0.58rem;
    color: rgba(200,214,232,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-val {
    font-size: 0.82rem;
    color: var(--silver);
    font-weight: 500;
  }

  .stat-val.highlight { color: var(--gold); }

  /* Time of day badge */
  .tod-badge {
    margin-left: auto;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
  }

  /* Slider section */
  #slider-wrap {
    flex-shrink: 0;
    padding: 10px 20px 12px;
    background: rgba(0,0,0,0.35);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #slider-label {
    font-size: 0.62rem;
    color: rgba(200,214,232,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #time-display-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #time-input {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: #fff;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid rgba(255,255,255,0.15);
    outline: none;
    width: 110px;
    text-align: right;
    cursor: text;
    transition: border-color 0.2s, color 0.2s;
    padding-bottom: 1px;
  }

  #time-input:focus {
    border-bottom-color: var(--gold);
    color: var(--gold);
  }

  #time-input::placeholder {
    color: rgba(255,255,255,0.35);
    font-size: 1rem;
  }

  #input-hint {
    font-size: 0.58rem;
    color: rgba(200,214,232,0.28);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* slider track: left of center = past (silver), right = future (gold), center mark = now */
  #slider-track-wrap {
    position: relative;
  }

  #now-marker {
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 14px;
    background: rgba(255,255,255,0.25);
    border-radius: 1px;
    pointer-events: none;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right,
      rgba(200,214,232,0.25) 0%,
      rgba(200,214,232,0.25) 50%,
      rgba(245,166,35,0.5) 50%,
      rgba(245,166,35,0.5) var(--pct, 50%),
      rgba(255,255,255,0.1) var(--pct, 50%),
      rgba(255,255,255,0.1) 100%
    );
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px rgba(245,166,35,0.6);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  #tick-row {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }

  .tick {
    font-size: 0.55rem;
    color: rgba(200,214,232,0.3);
    letter-spacing: 0.04em;
  }

  /* Stars layer */
  .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    transition: opacity 1.5s ease;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }
</style>

  <div id="shared-info">

  </div>
</header>

<div id="cities">

        <div class="city-label" id="name-0">New York</div>
        <span class="city-chevron">▾</span>
        <div class="city-dropdown" id="dropdown-0">
          <div class="dropdown-search-wrap">
            <input class="dropdown-search" id="search-0" placeholder="Search city…" oninput="filterDropdown(0,this.value)" onclick="event.stopPropagation()">
          </div>
          <div class="dropdown-list" id="list-0"></div>
        </div>
      </div>
      <div class="tod-badge" id="badge-0">day</div>
    </div>
    <div class="city-stats" id="stats-0"></div>
  </div>

  <div class="city-panel" id="panel-1">

          <div class="dropdown-search-wrap">

          </div>
          <div class="dropdown-list" id="list-1"></div>
        </div>
      </div>
      <div class="tod-badge" id="badge-1">night</div>
    </div>
    <div class="city-stats" id="stats-1"></div>
  </div>
</div>

<div id="slider-wrap">
  <div id="slider-header">
    <div id="slider-label">Time offset from now</div>
    <div id="time-display-wrap">
      <span id="input-hint">e.g. +3h, −1h 30m</span>
      <input id="time-input" type="text" value="Now" placeholder="+0h"
        title="Type an offset like +3h, -1h 30m, 2.5, or +90m"
        onkeydown="if(event.key==='Enter'){this.blur();}"
        onfocus="if(this.value==='Now')this.value=''"
        onblur="onTextBlur(this.value)">
    </div>
  </div>
  <div id="slider-track-wrap">
    <div id="now-marker"></div>
    <input type="range" id="time-slider" min="-1440" max="1440" value="0" step="1" oninput="onSlider(this.value)">
  </div>
  <div id="tick-row">
    <span class="tick">−24h</span>
    <span class="tick">−12h</span>
    <span class="tick">Now</span>
    <span class="tick">+12h</span>
    <span class="tick">+24h</span>
  </div>
</div>

// ---- DST-aware timezone offset using browser's Intl engine ----
// Returns the current UTC offset in hours for a given IANA zone
function getTzOffset(zone, dateMs) {
  try {
    // Intl gives us the local time parts — compare to UTC to get offset
    const utcParts  = new Intl.DateTimeFormat('en', {
      timeZone: 'UTC', hour: 'numeric', minute: 'numeric', hour12: false
    }).formatToParts(new Date(dateMs));
    const zoneParts = new Intl.DateTimeFormat('en', {
      timeZone: zone, hour: 'numeric', minute: 'numeric', hour12: false
    }).formatToParts(new Date(dateMs));

    const toH = parts => {
      const h = parseInt(parts.find(p => p.type === 'hour').value);
      const m = parseInt(parts.find(p => p.type === 'minute').value);
      return h + m / 60;
    };

    let diff = toH(zoneParts) - toH(utcParts);
    // Handle midnight wrap-around
    if (diff > 14)  diff -= 24;
    if (diff < -12) diff += 24;
    return diff;
  } catch {
    // Fallback: use the static tz field if zone lookup fails
    return 0;
  }
}

// Cached offsets — refresh every minute so DST transitions are noticed
let tzCache = {};
let tzCacheTime = 0;
function getCachedOffset(zone, nowMs) {
  if (nowMs - tzCacheTime > 60000) { tzCache = {}; tzCacheTime = nowMs; }
  if (!(zone in tzCache)) tzCache[zone] = getTzOffset(zone, nowMs);
  return tzCache[zone];
}

// Helper: readable UTC label for a zone at current time
function tzLabel(zone, nowMs) {
  const off = getCachedOffset(zone, nowMs);
  const sign = off >= 0 ? '+' : '−';
  const absOff = Math.abs(off);
  const h = Math.floor(absOff);
  const m = Math.round((absOff - h) * 60);
  return m === 0 ? `UTC${sign}${h}` : `UTC${sign}${h}:${String(m).padStart(2,'0')}`;
}


// Find indices by name for defaults
function cityIndex(name) { return CITIES.findIndex(c => c.name === name); }

// Sort alphabetically for display
const sortedIndices = CITIES.map((c, i) => i).sort((a, b) => CITIES[a].name.localeCompare(CITIES[b].name));

function renderList(panel, filter = '') {
  const nowMs = Date.now();
  const list = document.getElementById(`list-${panel}`);
  list.innerHTML = '';
  const q = filter.toLowerCase();
  sortedIndices.forEach(i => {
    const c = CITIES[i];
    if (q && !c.name.toLowerCase().includes(q)) return;
    const div = document.createElement('div');
    div.className = 'dropdown-option' + (selected[panel] === i ? ' selected' : '');
    div.innerHTML = `<span class="opt-name">${c.name}</span><span class="opt-tz">${tzLabel(c.zone, nowMs)}</span>`;
    div.onclick = (e) => {
      e.stopPropagation();
      selected[panel] = i;
      closeDropdown(panel);
      update();
    };
    list.appendChild(div);
  });
}

function toggleDropdown(panel, e) {
  e.stopPropagation();
  const wrap = document.getElementById(`wrap-${panel}`);
  const dd = document.getElementById(`dropdown-${panel}`);
  const isOpen = dd.classList.contains('open');
  closeDropdown(0); closeDropdown(1);
  if (!isOpen) {
    dd.classList.add('open');
    wrap.classList.add('open');
    const search = document.getElementById(`search-${panel}`);
    search.value = '';
    renderList(panel, '');
    setTimeout(() => search.focus(), 50);
  }
}

function closeDropdown(panel) {
  document.getElementById(`dropdown-${panel}`).classList.remove('open');
  document.getElementById(`wrap-${panel}`).classList.remove('open');
}

function filterDropdown(panel, val) {
  renderList(panel, val);
}

// Close dropdowns when clicking outside

// Stars generation
function makeStars(containerId, count) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;opacity:${Math.random()*0.6+0.2}`;
    el.appendChild(s);
  }
}
makeStars('stars-0', 60);
makeStars('stars-1', 60);

function fmt(h) {
  const hh = Math.floor(((h % 24) + 24) % 24);
  const mm = Math.round((h - Math.floor(h)) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm < 0 ? 0 : mm).padStart(2,'0')}`;
}

function fmtOffset(mins) {
  if (mins === 0) return 'Now';
  const sign = mins > 0 ? '+' : '−';
  const abs = Math.abs(mins);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  return m === 0 ? `${sign}${h}h` : `${sign}${h}h ${m}m`;
}

function getTodLabel(localH) {
  const h = ((localH % 24) + 24) % 24;
  if (h < 5 || h >= 22) return 'night';
  if (h < 7) return 'dawn';
  if (h < 19) return 'day';
  return 'dusk';
}

function drawArc(canvasId, city, localH) {
  const canvas = document.getElementById(canvasId);
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const sr = city.sr;
  const ss = city.ss;
  const dayLen = ss - sr;
  const nightLen = 24 - dayLen;

  // Arc geometry — single upper semicircle for both sun and moon
  const cx = W / 2;
  const cy = H * 0.82;
  const rx = W * 0.42;
  const ry = H * 0.62;

  // Draw horizon line
  ctx.save();
  ctx.beginPath();
  ctx.setLineDash([4, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.moveTo(cx - rx - 20, cy);
  ctx.lineTo(cx + rx + 20, cy);
  ctx.stroke();
  ctx.restore();

  // Draw day arc (upper semicircle, warm glow)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, 0);
  ctx.strokeStyle = 'rgba(245,166,35,0.12)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 6]);
  ctx.stroke();
  ctx.restore();

  // Sunrise / sunset markers at horizon endpoints
  const srX = cx - rx;
  const ssX = cx + rx;

  function drawMarker(x, y, label, align) {
    ctx.save();
    ctx.fillStyle = 'rgba(245,166,35,0.7)';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '500 10px DM Mono, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textAlign = align;
    ctx.fillText(label, x + (align === 'left' ? 8 : -8), y + 4);
    ctx.restore();
  }
  drawMarker(srX, cy, fmt(sr), 'left');
  drawMarker(ssX, cy, fmt(ss), 'right');

  const lh = ((localH % 24) + 24) % 24;
  const isDay = lh >= sr && lh <= ss;
  let iconPos, angle;

  if (isDay) {
    // Sun: travels left→right across the upper arc during daytime
    const t = (lh - sr) / dayLen; // 0..1
    angle = Math.PI - t * Math.PI; // PI (left) → 0 (right)
    iconPos = {
      x: cx + rx * Math.cos(angle),
      y: cy - ry * Math.sin(angle)
    };
  } else {
    // Moon: also travels the upper arc, but during night hours
    // Night runs from ss → (midnight) → sr (wrapping around)
    let nightProgress;
    if (lh > ss) {
      // Evening: ss to midnight → 0..0.5
      nightProgress = (lh - ss) / nightLen;
    } else {
      // Early morning: midnight to sr → 0.5..1
      nightProgress = (lh + (24 - ss)) / nightLen;
    }
    // Moon enters from right (ss side) and exits left (sr side), opposite of sun
    angle = nightProgress * Math.PI; // 0 (right) → PI (left)
    iconPos = {
      x: cx + rx * Math.cos(angle),
      y: cy - ry * Math.sin(angle)
    };
  }

  // Glow
  if (isDay) {
    const grd = ctx.createRadialGradient(iconPos.x, iconPos.y, 0, iconPos.x, iconPos.y, 40);
    grd.addColorStop(0, 'rgba(245,166,35,0.28)');
    grd.addColorStop(1, 'rgba(245,166,35,0)');
    ctx.beginPath();
    ctx.arc(iconPos.x, iconPos.y, 40, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  } else {
    const grd = ctx.createRadialGradient(iconPos.x, iconPos.y, 0, iconPos.x, iconPos.y, 28);
    grd.addColorStop(0, 'rgba(180,210,255,0.2)');
    grd.addColorStop(1, 'rgba(180,210,255,0)');
    ctx.beginPath();
    ctx.arc(iconPos.x, iconPos.y, 28, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Icon
  ctx.font = isDay ? '22px serif' : '18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(isDay ? '☀' : '🌙', iconPos.x, iconPos.y);

  // Local time label near icon
  ctx.font = '500 11px DM Mono, monospace';
  ctx.fillStyle = isDay ? 'rgba(255,255,255,0.85)' : 'rgba(200,214,232,0.65)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(fmt(lh), iconPos.x, iconPos.y + 16);

  ctx.restore();
}

function sharedDaylight(c1, c2, viewMs) {
  const tz1 = getCachedOffset(c1.zone, viewMs);
  const tz2 = getCachedOffset(c2.zone, viewMs);
  const sr1 = (c1.sr - tz1) * 60;
  const ss1 = (c1.ss - tz1) * 60;
  const sr2 = (c2.sr - tz2) * 60;
  const ss2 = (c2.ss - tz2) * 60;

  // Build all daylight intervals for c2 across a 3-day window (-1, 0, +1 day)
  // to catch cases where one city's day wraps into the next UTC day
  let totalOverlap = 0;
  for (const offset of [-1440, 0, 1440]) {
    const overlapStart = Math.max(sr1, sr2 + offset);
    const overlapEnd   = Math.min(ss1, ss2 + offset);
    if (overlapEnd > overlapStart) {
      totalOverlap += overlapEnd - overlapStart;
    }
  }

  if (totalOverlap <= 0) return 'None';
  const h = Math.floor(totalOverlap / 60);
  const m = Math.round(totalOverlap % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function update() {
  const now = new Date();
  const nowMs = now.getTime();
  const utcH = (now.getUTCHours() * 60 + now.getUTCMinutes() + offsetMinutes) / 60;
  // The actual moment we're viewing (for DST offset lookup)
  const viewMs = nowMs + offsetMinutes * 60000;

  [0, 1].forEach(p => {
    const city = CITIES[selected[p]];
    const tz = getCachedOffset(city.zone, viewMs);
    const localH = ((utcH + tz) % 24 + 24) % 24;
    const isDay = localH >= city.sr && localH <= city.ss;
    const tod = getTodLabel(localH);

    const panel = document.getElementById(`panel-${p}`);
    panel.className = 'city-panel';
    if (tod === 'night') panel.classList.add('is-night');
    else if (tod === 'day') panel.classList.add('is-day');
    else panel.classList.add('is-golden');

    document.getElementById(`stars-${p}`).style.opacity = isDay ? '0' : '1';
    document.getElementById(`name-${p}`).textContent = city.name;

    const badge = document.getElementById(`badge-${p}`);
    badge.textContent = tod;
    badge.style.color = isDay ? 'rgba(245,210,80,0.9)' : 'rgba(150,180,220,0.7)';

    const tzStr = tzLabel(city.zone, viewMs);
    const dayLen = city.ss - city.sr;
    const dh = Math.floor(dayLen), dm = Math.round((dayLen - dh) * 60);

    document.getElementById(`stats-${p}`).innerHTML = `
      <div class="stat">
        <div class="stat-label">Local time</div>
        <div class="stat-val highlight">${fmt(localH)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Timezone</div>
        <div class="stat-val">${tzStr}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sunrise</div>
        <div class="stat-val">${fmt(city.sr)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sunset</div>
        <div class="stat-val">${fmt(city.ss)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Daylight</div>
        <div class="stat-val">${dh}h ${dm}m</div>
      </div>
    `;

    drawArc(`canvas-${p}`, city, localH);
  });

  const c1 = CITIES[selected[0]];
  const c2 = CITIES[selected[1]];
  const tz1 = getCachedOffset(c1.zone, viewMs);
  const tz2 = getCachedOffset(c2.zone, viewMs);
  const tzDiff = Math.abs(tz1 - tz2);
  const tzDiffH = Math.floor(tzDiff);
  const tzDiffM = Math.round((tzDiff - tzDiffH) * 60);
  const tzDiffStr = tzDiff === 0 ? 'Same timezone'
    : tzDiffM > 0 ? `${tzDiffH}h ${tzDiffM}m apart` : `${tzDiffH}h apart`;
  document.getElementById('tz-diff').textContent = tzDiffStr;
  document.getElementById('shared-dl').textContent = sharedDaylight(c1, c2, viewMs);

  const pct = ((offsetMinutes + 1440) / 2880 * 100).toFixed(2);
  document.getElementById('time-slider').style.setProperty('--pct', `${pct}%`);
  document.getElementById('time-input').value = fmtOffset(offsetMinutes);
}

function onSlider(val) {
  offsetMinutes = parseInt(val);
  update();
}

// Parse typed offset strings like "+3h", "-1h 30m", "+90m", "2h", "-45m", "now"
function parseOffsetInput(raw) {
  const s = raw.trim().toLowerCase().replace('−', '-').replace('–', '-');
  if (!s || s === 'now' || s === '0') return 0;

  let total = 0;
  const sign = s.startsWith('-') ? -1 : 1;
  const clean = s.replace(/^[+-]/, '');

  // Match hours and/or minutes in any order: "3h 30m", "90m", "1h", "30"
  const hMatch = clean.match(/(\d+(?:\.\d+)?)\s*h/);
  const mMatch = clean.match(/(\d+)\s*m/);
  // If no unit found, treat plain number as hours
  const plainMatch = !hMatch && !mMatch && clean.match(/^(\d+(?:\.\d+)?)$/);

  if (hMatch) total += parseFloat(hMatch[1]) * 60;
  if (mMatch) total += parseInt(mMatch[1]);
  if (plainMatch) total += parseFloat(plainMatch[1]) * 60;

  const result = Math.round(sign * total);
  return Math.max(-1440, Math.min(1440, result));
}

function onTextBlur(val) {
  const parsed = parseOffsetInput(val);
  offsetMinutes = isNaN(parsed) ? 0 : parsed;
  document.getElementById('time-slider').value = offsetMinutes;
  update(); // update() will set the input value to formatted string
}

window.addEventListener('resize', update);
update();

// Register service worker for PWA offline support (skipped in preview/sandbox environments)
if ('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.log('SW registration skipped:', err));
  });
}
